    <rect x="150" y="196" width="118" height="32" rx="16" fill="#e0662e"/>
    <rect x="150" y="240" width="92" height="32" rx="16" fill="#e0662e"/>
    <rect x="150" y="284" width="70" height="32" rx="16" fill="#e0662e"/>
